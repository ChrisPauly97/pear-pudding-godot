name: Android APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Download Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          chmod +x Godot_v4.6-stable_linux.x86_64
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O export_templates.tpz
          echo "tpz size: $(wc -c < export_templates.tpz) bytes"
          echo "--- tpz contents (top 30) ---"
          unzip -l export_templates.tpz | head -30
          unzip export_templates.tpz -d /tmp/godot_templates
          echo "--- extracted root ---"
          ls /tmp/godot_templates/
          # Handle both possible archive structures
          if [ -d /tmp/godot_templates/templates ]; then
            cp -r /tmp/godot_templates/templates/. "$TEMPLATES_DIR/"
          else
            cp -r /tmp/godot_templates/. "$TEMPLATES_DIR/"
          fi
          echo "--- installed templates (android) ---"
          ls "$TEMPLATES_DIR/" | grep -i android || echo "NO ANDROID TEMPLATES FOUND"

      - name: Set up keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from repository secrets"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/android.keystore"
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            echo "No keystore secrets — generating a debug keystore"
            keytool -genkey -v \
              -keystore "$GITHUB_WORKSPACE/android.keystore" \
              -alias key0 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Pear Pudding TCG, O=Debug, C=US" \
              -storetype JKS
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=key0" >> $GITHUB_ENV
          fi

      - name: Write Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          SETTINGS="$HOME/.config/godot/editor_settings-4.tres"
          echo '[gd_resource type="EditorSettings" format=3]' > "$SETTINGS"
          echo '' >> "$SETTINGS"
          echo '[resource]' >> "$SETTINGS"
          echo "export/android/android_sdk_path = \"$ANDROID_SDK_ROOT\"" >> "$SETTINGS"
          echo "export/android/debug_keystore = \"$KEYSTORE_PATH\"" >> "$SETTINGS"
          echo "export/android/debug_keystore_user = \"$KEY_ALIAS\"" >> "$SETTINGS"
          echo "export/android/debug_keystore_pass = \"$KEYSTORE_PASSWORD\"" >> "$SETTINGS"
          echo "--- editor settings ---"
          cat "$SETTINGS"
          echo "--- sdk build-tools ---"
          ls "$ANDROID_SDK_ROOT/build-tools/" || echo "MISSING build-tools"
          echo "--- sdk platforms ---"
          ls "$ANDROID_SDK_ROOT/platforms/" || echo "MISSING platforms"
          echo "--- apksigner check ---"
          ls "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" || echo "MISSING apksigner"
          echo "--- keystore check ---"
          ls "$KEYSTORE_PATH" || echo "MISSING keystore"

      - name: Patch keystore into export_presets.cfg
        run: |
          # Inject keystore values from env into the committed export_presets.cfg.
          # The committed file has empty keystore fields; sed fills them in.
          sed -i \
            -e "s|keystore/debug=\"\"|keystore/debug=\"$KEYSTORE_PATH\"|" \
            -e "s|keystore/debug_user=\"\"|keystore/debug_user=\"$KEY_ALIAS\"|" \
            -e "s|keystore/debug_password=\"\"|keystore/debug_password=\"$KEYSTORE_PASSWORD\"|" \
            -e "s|keystore/release=\"\"|keystore/release=\"$KEYSTORE_PATH\"|" \
            -e "s|keystore/release_user=\"\"|keystore/release_user=\"$KEY_ALIAS\"|" \
            -e "s|keystore/release_password=\"\"|keystore/release_password=\"$KEYSTORE_PASSWORD\"|" \
            "$GITHUB_WORKSPACE/export_presets.cfg"
          echo "--- patched export_presets.cfg (keystore lines) ---"
          grep keystore "$GITHUB_WORKSPACE/export_presets.cfg"

      - name: Import project assets
        run: |
          godot --headless --path "$GITHUB_WORKSPACE" --editor --quit 2>&1 || true
          echo "--- import scan complete ---"

      - name: Export APK
        run: |
          mkdir -p build
          godot --headless --path "$GITHUB_WORKSPACE" --export-release "Android" "$GITHUB_WORKSPACE/build/PearPuddingTCG.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PearPuddingTCG-${{ github.sha }}
          path: build/PearPuddingTCG.apk
          if-no-files-found: error
