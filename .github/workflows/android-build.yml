name: Android APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        run: |
          ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Download Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          chmod +x Godot_v4.6-stable_linux.x86_64
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O export_templates.tpz
          unzip -q export_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TEMPLATES_DIR/"

      - name: Set up keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from repository secrets"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/android.keystore"
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            echo "No keystore secrets found — generating a debug keystore"
            keytool -genkey -v \
              -keystore "$GITHUB_WORKSPACE/android.keystore" \
              -alias key0 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Pear Pudding TCG, O=Debug, C=US" \
              -storetype JKS
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=key0" >> $GITHUB_ENV
          fi

      - name: Patch export_presets.cfg with keystore paths
        run: |
          sed -i \
            -e "s|KEYSTORE_PATH_PLACEHOLDER|$KEYSTORE_PATH|g" \
            -e "s|KEYSTORE_PASSWORD_PLACEHOLDER|$KEYSTORE_PASSWORD|g" \
            -e "s|KEY_ALIAS_PLACEHOLDER|$KEY_ALIAS|g" \
            export_presets.cfg

      - name: Write Godot editor settings
        run: |
          SETTINGS_DIR="$HOME/.config/godot"
          mkdir -p "$SETTINGS_DIR"
          cat > "$SETTINGS_DIR/editor_settings-4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Export APK
        run: |
          mkdir -p build
          godot --headless --export-release "Android" build/PearPuddingTCG.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PearPuddingTCG-${{ github.sha }}
          path: build/PearPuddingTCG.apk
          if-no-files-found: error
